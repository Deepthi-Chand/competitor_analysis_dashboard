version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hwaidashboard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dashboarddb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dashboarddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hwaidashboard-redis
    ports:
      - "6379:6379"
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hwaidashboard-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://user:password@postgres:5432/dashboarddb
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 86400
      USE_CACHE: 'true'
      USE_RATE_LIMIT: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dashboard-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hwaidashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dashboard-network
    restart: unless-stopped

networks:
  dashboard-network:
    driver: bridge

volumes:
  postgres_data:
