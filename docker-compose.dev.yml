version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hwaidashboard-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dashboarddb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dashboard-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dashboarddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hwaidashboard-redis-dev
    ports:
      - "6379:6379"
    networks:
      - dashboard-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hwaidashboard-backend-dev
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://user:password@postgres:5432/dashboarddb
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 86400
      USE_CACHE: 'true'
      USE_RATE_LIMIT: 'true'
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/package.json:/app/package.json
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dashboard-network-dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hwaidashboard-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=3000
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/package.json:/app/package.json
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - dashboard-network-dev
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  dashboard-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  backend_node_modules:
  frontend_node_modules:
